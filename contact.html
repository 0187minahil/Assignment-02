<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Local Tourism</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Contact Us</h1>
        <p>We are here to help you plan your perfect trip ✈️</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a>
        <a href="destination.html">Destinations</a>
        <a href="packages.html">Packages</a>
        <a href="gallery.htm">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- Contact Section -->
    <section>
        <h2>Get in Touch</h2>

        <form>

            <label for="name">Full Name</label><br>
            <input type="text" id="name" placeholder="Enter your name" required>
            <br><br>

            <label for="email">Email</label><br>
            <input type="email" id="email" placeholder="Enter your email" required>
            <br><br>

            <label for="phone">Phone Number</label><br>
            <input type="tel" id="phone" placeholder="Enter your phone number">
            <br><br>

            <label for="message">Message</label><br>
            <textarea id="message" rows="6" placeholder="Write your message here..." required></textarea>
            <br><br>

            <button type="submit">Send Message</button>

        </form>
    </section>

    <!-- Contact Info -->
    <section>
        <h2>Our Contact Details</h2>

        <p>📍 Location: Pakistan Tourism Office</p>
        <p>📧 Email: info@tourism.com</p>
        <p>📞 Phone: +92 300 1234567</p>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Local Tourism Website | All Rights Reserved</p>
    </footer>

</body>
</html>
